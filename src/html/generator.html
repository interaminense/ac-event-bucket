<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AC Events Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #07090d;
      --bg-panel:   #090c12;
      --bg-surface: #0d1018;
      --border:     #181d2c;
      --border-dim: #0f1320;
      --text-1:     #dde3f5;
      --text-2:     #6b7799;
      --text-3:     #313a52;
      --green:      #3dfc8d;
      --green-bg:   #071c11;
      --red:        #ff4f6e;
      --red-bg:     #1f0a12;
      --blue:       #4da6ff;
      --blue-dim:   rgba(77,166,255,0.09);
      --fn-ui:      'Bricolage Grotesque', system-ui, sans-serif;
      --fn-mono:    'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--fn-ui);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
       SHELL — 3-column grid
    ═══════════════════════════════════════════ */

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr 240px;
      grid-template-rows: 38px 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */

    .hdr {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }

    .hdr-brand {
      font-family: var(--fn-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.07em;
    }

    .hdr-brand b { color: var(--text-1); }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sdk-warning {
      display: none;
      align-items: center;
      gap: 5px;
      font-family: var(--fn-mono);
      font-size: 11px;
      color: #f0b429;
    }

    #sdk-warning::before { content: "⚠"; }

    #sdk-status {
      font-family: var(--fn-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 2px;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(61,252,141,0.14);
    }

    /* ═══════════════════════════════════════════
       SHARED
    ═══════════════════════════════════════════ */

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    /* ═══════════════════════════════════════════
       LEFT PANEL — Templates
    ═══════════════════════════════════════════ */

    .panel-l {
      grid-row: 2;
      grid-column: 1;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-l-head {
      padding: 9px 12px 8px;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }

    .panel-l-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 3px 0 8px;
    }

    .template-group-header {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 5px 12px;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      font-family: var(--fn-ui);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      text-align: left;
      transition: color 0.1s, background 0.1s;
    }

    .template-group-header:hover {
      background: rgba(255,255,255,0.025);
      color: var(--text-1);
    }

    .template-group-header .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .template-group-header .label { flex: 1; }

    .template-group-header .chevron {
      font-size: 10px;
      color: var(--text-3);
    }

    .template-row {
      display: block;
      width: 100%;
      padding: 3.5px 12px 3.5px 26px;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      font-family: var(--fn-mono);
      font-size: 13px;
      color: var(--text-3);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s, border-left-color 0.1s, background 0.1s;
    }

    .template-row:hover {
      color: var(--text-2);
      background: rgba(255,255,255,0.02);
    }

    .template-row[data-active="true"] {
      color: var(--text-1);
      background: rgba(255,255,255,0.035);
    }

    /* ═══════════════════════════════════════════
       CENTER PANEL — Form
    ═══════════════════════════════════════════ */

    .panel-c {
      grid-row: 2;
      grid-column: 2;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .form-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field > label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .field input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 10px;
      font-family: var(--fn-mono);
      font-size: 13px;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--blue); }
    .field input::placeholder { color: var(--text-3); }

    #app-id-wrap { position: relative; }
    #app-id-wrap input { padding-right: 26px; }

    #app-color-dot {
      display: none;
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Properties */
    .props-wrap {
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      overflow: hidden;
    }

    .props-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border-dim);
    }

    #add-property {
      font-family: var(--fn-mono);
      font-size: 11px;
      color: var(--blue);
      background: var(--blue-dim);
      border: 1px solid rgba(77,166,255,0.18);
      border-radius: 2px;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    #add-property:hover { background: rgba(77,166,255,0.16); }

    #properties-list {
      padding: 3px 0;
      min-height: 30px;
      display: flex;
      flex-direction: column;
    }

    #props-empty {
      font-size: 12px;
      color: var(--text-3);
      padding: 8px 12px;
      font-style: italic;
    }

    .prop-row {
      display: grid;
      grid-template-columns: 1fr 14px 1fr 18px;
      align-items: center;
      padding: 2px 8px;
      transition: background 0.1s;
    }

    .prop-row:hover { background: rgba(255,255,255,0.02); }

    .prop-row input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--fn-mono);
      font-size: 12px;
      color: var(--text-1);
      padding: 3px 4px;
      width: 100%;
    }

    .prop-row input:first-child { color: var(--blue); }
    .prop-row input::placeholder { color: var(--text-3); }

    .prop-row > span {
      font-family: var(--fn-mono);
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-3);
      padding: 0;
      line-height: 1;
      text-align: center;
      transition: color 0.1s;
    }

    .btn-remove:hover { color: var(--red); }

    /* Actions */
    .actions { display: flex; gap: 8px; }

    #send-btn {
      flex: 1;
      padding: 9px 0;
      background: var(--green);
      color: #021509;
      font-family: var(--fn-ui);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.08s;
    }

    #send-btn:hover { opacity: 0.87; }
    #send-btn:active { transform: scale(0.98); }

    #save-btn {
      padding: 9px 14px;
      background: transparent;
      color: var(--blue);
      font-family: var(--fn-ui);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(77,166,255,0.24);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    #save-btn:hover {
      background: var(--blue-dim);
      border-color: rgba(77,166,255,0.4);
    }

    #clear-btn {
      padding: 9px 14px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--fn-ui);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s;
    }

    #clear-btn:hover { background: rgba(255,255,255,0.03); }

    /* Feedback */
    #feedback {
      display: none;
      font-family: var(--fn-mono);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 3px;
    }

    #feedback[data-type="success"] {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(61,252,141,0.14);
    }

    #feedback[data-type="error"] {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(255,79,110,0.14);
    }

    /* ═══════════════════════════════════════════
       RIGHT PANEL — Activity
    ═══════════════════════════════════════════ */

    .panel-r {
      grid-row: 2;
      grid-column: 3;
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .activity-block { display: flex; flex-direction: column; }

    .activity-block + .activity-block {
      border-top: 1px solid var(--border);
    }

    .activity-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 7px;
      border-bottom: 1px solid var(--border-dim);
      position: sticky;
      top: 0;
      background: var(--bg-panel);
      z-index: 1;
    }

    .activity-badge {
      font-family: var(--fn-mono);
      font-size: 10px;
      min-width: 16px;
      padding: 1px 5px;
      border-radius: 8px;
      background: var(--bg-surface);
      color: var(--text-3);
      text-align: center;
    }

    /* Saved rows */
    .saved-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border-dim);
      transition: background 0.1s;
    }

    .saved-row:hover { background: rgba(255,255,255,0.02); }

    .saved-row .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .saved-event-id {
      font-family: var(--fn-mono);
      font-size: 11px;
      color: var(--text-1);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .saved-app-id {
      font-size: 10px;
      color: var(--text-3);
      font-family: var(--fn-mono);
      flex-shrink: 0;
    }

    .saved-prop-count {
      font-size: 10px;
      color: var(--text-3);
      background: var(--bg-surface);
      padding: 0 4px;
      border-radius: 2px;
      font-family: var(--fn-mono);
      flex-shrink: 0;
    }

    .saved-actions {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .saved-actions button {
      font-family: var(--fn-mono);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      transition: background 0.1s, color 0.1s;
    }

    .saved-actions .btn-load {
      color: var(--blue);
      border-color: rgba(77,166,255,0.15);
      background: rgba(77,166,255,0.05);
    }

    .saved-actions .btn-load:hover { background: rgba(77,166,255,0.13); }

    .saved-actions .btn-send {
      color: var(--green);
      border-color: rgba(61,252,141,0.14);
      background: rgba(61,252,141,0.04);
    }

    .saved-actions .btn-send:hover { background: rgba(61,252,141,0.11); }

    .saved-actions .btn-delete { color: var(--text-3); }
    .saved-actions .btn-delete:hover {
      color: var(--red);
      background: rgba(255,79,110,0.06);
    }

    #saved-empty, #history-empty {
      font-size: 12px;
      color: var(--text-3);
      padding: 12px;
      text-align: center;
      font-style: italic;
    }

    /* History rows */
    .history-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border-dim);
      transition: background 0.1s;
    }

    .history-row:hover { background: rgba(255,255,255,0.02); }

    .history-row .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .history-content {
      flex: 1;
      min-width: 0;
    }

    .history-event-id {
      font-family: var(--fn-mono);
      font-size: 11px;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      display: flex;
      gap: 6px;
      margin-top: 1px;
    }

    .history-app, .history-time {
      font-size: 10px;
      font-family: var(--fn-mono);
      color: var(--text-3);
    }

    .btn-resend {
      font-family: var(--fn-mono);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      cursor: pointer;
      color: var(--green);
      background: rgba(61,252,141,0.04);
      border: 1px solid rgba(61,252,141,0.14);
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .btn-resend:hover { background: rgba(61,252,141,0.11); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>
<body>

  <div class="shell">

    <!-- ═══ HEADER ══════════════════════════════════════════════ -->
    <header class="hdr">
      <div class="hdr-brand"><b>AC</b> events generator</div>
      <div class="hdr-right">
        <div id="sdk-warning"><span>Analytics SDK not found</span></div>
        <span id="sdk-status">detecting...</span>
      </div>
    </header>

    <!-- ═══ LEFT — Templates ════════════════════════════════════ -->
    <aside class="panel-l">
      <div class="panel-l-head">
        <span class="section-label">Templates</span>
      </div>
      <div class="panel-l-scroll">
        <div id="templates-list"></div>
      </div>
    </aside>

    <!-- ═══ CENTER — Form ═══════════════════════════════════════ -->
    <main class="panel-c">
      <div class="form-scroll">

        <div class="field-row">
          <div class="field">
            <label for="event-id">Event ID</label>
            <input id="event-id" type="text" placeholder="e.g. pageViewed" autocomplete="off" />
          </div>
          <div class="field">
            <label for="application-id">Application ID</label>
            <div id="app-id-wrap">
              <input id="application-id" type="text" placeholder="e.g. Page" autocomplete="off" />
              <span id="app-color-dot"></span>
            </div>
          </div>
        </div>

        <div class="props-wrap">
          <div class="props-head">
            <span class="section-label">Properties</span>
            <button id="add-property">+ add</button>
          </div>
          <div id="properties-list">
            <p id="props-empty">No properties — select a template or add manually.</p>
          </div>
        </div>

        <div class="actions">
          <button id="send-btn">Send</button>
          <button id="save-btn">Save</button>
          <button id="clear-btn">Clear</button>
        </div>

        <div id="feedback"></div>

      </div>
    </main>

    <!-- ═══ RIGHT — Activity ═════════════════════════════════════ -->
    <aside class="panel-r">

      <div class="activity-block">
        <div class="activity-block-head">
          <span class="section-label">Saved</span>
          <span class="activity-badge" id="saved-count"></span>
        </div>
        <div id="saved-events-list"></div>
        <p id="saved-empty">No saved events yet.</p>
      </div>

      <div class="activity-block">
        <div class="activity-block-head">
          <span class="section-label">Sent History</span>
          <span class="activity-badge" id="history-count"></span>
        </div>
        <div id="history-list"></div>
        <p id="history-empty">No events sent yet.</p>
      </div>

    </aside>

  </div>

  <script src="../js/generator.js"></script>
</body>
</html>

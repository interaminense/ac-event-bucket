<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AC Events Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/generator.css" />
</head>
<body>

  <div class="shell">

    <!-- ═══ HEADER ══════════════════════════════════════════════ -->
    <header class="hdr">
      <div class="hdr-brand"><b>AC</b> events generator</div>
      <div class="hdr-right">
        <div id="sdk-warning"><span>Analytics SDK not found</span></div>
        <span id="sdk-status">detecting...</span>
      </div>
    </header>

    <!-- ═══ LEFT — Templates ════════════════════════════════════ -->
    <aside class="panel-l">
      <div class="panel-l-head">
        <span class="section-label">Templates</span>
      </div>
      <div class="panel-l-scroll">
        <div id="templates-list"></div>
      </div>
    </aside>

    <!-- ═══ CENTER — Form ═══════════════════════════════════════ -->
    <main class="panel-c">
      <div class="form-scroll">

        <div class="field-row">
          <div class="field">
            <label for="event-id">Event ID</label>
            <input id="event-id" type="text" placeholder="e.g. pageViewed" autocomplete="off" />
          </div>
          <div class="field">
            <label for="application-id">Application ID</label>
            <div id="app-id-wrap">
              <input id="application-id" type="text" placeholder="e.g. Page" autocomplete="off" />
              <span id="app-color-dot"></span>
            </div>
          </div>
        </div>

        <div class="props-wrap">
          <div class="props-head">
            <span class="section-label">Properties</span>
            <button id="add-property">+ add</button>
          </div>
          <div id="properties-list">
            <p id="props-empty">No properties — select a template or add manually.</p>
          </div>
        </div>

        <div class="actions">
          <button id="send-btn">Send</button>
          <button id="save-btn">Save</button>
          <button id="clear-btn">Clear</button>
        </div>

        <div id="feedback"></div>

      </div>
    </main>

    <!-- ═══ RIGHT — Activity ═════════════════════════════════════ -->
    <aside class="panel-r">

      <div class="activity-block">
        <div class="activity-block-head">
          <span class="section-label">Saved</span>
          <span class="activity-badge" id="saved-count"></span>
        </div>
        <div id="saved-events-list"></div>
        <p id="saved-empty">No saved events yet.</p>
      </div>

      <div class="activity-block">
        <div class="activity-block-head">
          <span class="section-label">Sent History</span>
          <span class="activity-badge" id="history-count"></span>
        </div>
        <div id="history-list"></div>
        <p id="history-empty">No events sent yet.</p>
      </div>

    </aside>

  </div>

  <script src="../js/generator.js"></script>
</body>
</html>

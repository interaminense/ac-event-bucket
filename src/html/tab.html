<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AC Event Bucket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tab.css" />
</head>
<body>

  <header class="hdr">
    <div class="hdr-left">
      <span id="status"></span>
      <span class="hdr-brand"><b>AC</b> event bucket</span>
    </div>
    <div class="hdr-right">
      <button id="toggleBtn" class="hdr-btn"></button>
      <button id="clearBtn" class="hdr-btn">Clear</button>
    </div>
  </header>

  <div id="sub-header" class="hidden">
    <div class="sub-meta">
      <div class="sub-meta-item">
        <span class="sub-meta-label">Channel ID</span>
        <span id="channel-id" class="sub-meta-value"></span>
      </div>
      <div class="sub-meta-item">
        <span class="sub-meta-label">Data Source ID</span>
        <span id="data-source-id" class="sub-meta-value"></span>
      </div>
      <div class="sub-meta-item">
        <span class="sub-meta-label">Individual</span>
        <span id="individual"></span>
      </div>
    </div>
    <input id="search" type="text" placeholder="Search by event ID or application ID..." />
  </div>

  <div id="events-list"></div>

  <footer class="ftr">
    <span class="ftr-brand">AC Event Bucket v2.1.0</span>
    <div class="ftr-right">
      <a href="https://github.com/interaminense" target="_blank" class="ftr-link">@interaminense</a>
      <span id="analytics-version">Analytics SDK: detecting...</span>
    </div>
  </footer>

  <script src="../js/tab.js"></script>
</body>
</html>
